<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <title>JØLLY HUB Ø</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-red: #ff0000;
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .container {
            border: 2px solid var(--neon-blue);
            padding: 40px 20px;
            border-radius: 40px;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.2);
            max-width: 360px;
            width: 85%;
            background: #0a0a0a;
        }
        h1 {
            color: var(--neon-blue);
            font-size: 3rem;
            letter-spacing: 10px;
            margin: 0;
            font-weight: 900;
        }
        .subtitle {
            color: #444;
            font-size: 0.8rem;
            margin-bottom: 40px;
            text-transform: uppercase;
        }
        .btn-deploy {
            display: block;
            color: #000;
            padding: 25px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.2rem;
            border: none;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s;
        }
        .btn-blue {
            background: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            margin-bottom: 20px;
        }
        .btn-red {
            background: var(--neon-red);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }
        .btn-deploy:active { transform: scale(0.95); }
        #status-msg {
            font-size: 0.6rem;
            color: #222;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JØLLY</h1>
        <p class="subtitle">Ø-1.5 PROTOCOLLO</p>
        <button id="callBtn" class="btn-deploy btn-blue">EMERGENZA ELISA</button>
        <button id="apBtn" class="btn-deploy btn-red">CONSULENZA J0LLY</button>
        <p id="status-msg">CERTIFICA</p>
    </div>
    <script src="main.js"></script>
</body>
</html>
